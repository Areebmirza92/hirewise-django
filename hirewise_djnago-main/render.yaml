services:
  - type: web
    name: hirewise-django
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn hirewise.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: hirewise-db
          property: connectionString

databases:
  - name: hirewise-db
    databaseName: hirewise_db
    user: hirewise
    plan: free
